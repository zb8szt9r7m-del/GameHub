<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — GameHub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c14; --surface:#0d1520; --surface2:#111d2e; --border:#1a2d47;
  --accent:#00d4ff; --accent2:#ff6b2b; --gold:#ffd700; --text:#c8d8e8;
  --text-dim:#5a7a9a; --green:#00ff88; --red:#ff3355;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; min-height:100vh; }
.admin-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 32px; background:var(--surface); border-bottom:1px solid var(--border);
}
.admin-logo { font-family:'Orbitron',sans-serif; font-size:1.2rem; color:var(--accent2); letter-spacing:3px; }
.admin-nav { display:flex; gap:8px; }
.nav-btn {
  padding:8px 16px; border:1px solid var(--border); border-radius:6px;
  background:transparent; color:var(--text-dim); cursor:pointer;
  font-family:'Rajdhani',sans-serif; font-size:0.9rem; transition:all 0.2s;
}
.nav-btn.active, .nav-btn:hover { border-color:var(--accent2); color:var(--accent2); }
.back-btn { padding:8px 16px; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--text-dim); cursor:pointer; font-family:'Rajdhani',sans-serif; text-decoration:none; }

.admin-main { max-width:1200px; margin:0 auto; padding:32px 24px; }

/* STATS */
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:32px; }
.stat-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px;
  text-align:center;
}
.stat-icon { font-size:2rem; margin-bottom:8px; }
.stat-value { font-family:'Orbitron',sans-serif; font-size:2rem; color:var(--accent); font-weight:700; }
.stat-label { color:var(--text-dim); font-size:0.9rem; }

/* SECTIONS */
.section { display:none; }
.section.active { display:block; }
.section-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:20px;
}
.section-title { font-family:'Orbitron',sans-serif; font-size:1rem; color:var(--text-dim); letter-spacing:3px; }

/* TABLE */
.data-table {
  width:100%; border-collapse:collapse;
  background:var(--surface); border-radius:10px; overflow:hidden;
  border:1px solid var(--border);
}
.data-table th {
  background:var(--surface2); padding:12px 16px; text-align:left;
  font-family:'Orbitron',sans-serif; font-size:0.75rem; color:var(--text-dim);
  letter-spacing:2px; border-bottom:1px solid var(--border);
}
.data-table td { padding:12px 16px; border-bottom:1px solid rgba(26,45,71,0.5); font-size:0.9rem; }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:hover td { background:rgba(255,255,255,0.02); }
.badge {
  padding:3px 8px; border-radius:4px; font-size:0.75rem;
  font-family:'Orbitron',sans-serif; letter-spacing:1px;
}
.badge.admin { background:rgba(255,107,43,0.15); color:var(--accent2); border:1px solid rgba(255,107,43,0.3); }
.badge.banned { background:rgba(255,51,85,0.15); color:var(--red); border:1px solid rgba(255,51,85,0.3); }
.badge.normal { background:rgba(0,255,136,0.1); color:var(--green); border:1px solid rgba(0,255,136,0.2); }

/* GRANT FORM */
.grant-form {
  background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px; margin-bottom:24px;
  display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap;
}
.form-field { display:flex; flex-direction:column; gap:6px; }
.form-field label { font-size:0.8rem; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; }
.form-field input {
  padding:10px 14px; background:var(--bg); border:1px solid var(--border);
  border-radius:6px; color:var(--text); font-family:'Rajdhani',sans-serif; font-size:0.95rem;
  outline:none; width:200px;
}
.form-field input:focus { border-color:var(--accent); }
.btn-admin {
  padding:10px 20px; border:none; border-radius:6px;
  background:linear-gradient(135deg, var(--accent2), #cc4400);
  color:#fff; font-family:'Orbitron',sans-serif; font-size:0.8rem; font-weight:700;
  cursor:pointer; letter-spacing:1px; transition:all 0.2s;
}
.btn-admin:hover { opacity:0.9; transform:translateY(-1px); }
.btn-danger {
  padding:6px 12px; border:1px solid rgba(255,51,85,0.4); border-radius:4px;
  background:transparent; color:var(--red); cursor:pointer;
  font-family:'Rajdhani',sans-serif; font-size:0.85rem; transition:all 0.2s;
}
.btn-danger:hover { background:rgba(255,51,85,0.15); }
.btn-success {
  padding:6px 12px; border:1px solid rgba(0,255,136,0.4); border-radius:4px;
  background:transparent; color:var(--green); cursor:pointer;
  font-family:'Rajdhani',sans-serif; font-size:0.85rem; transition:all 0.2s;
}
.btn-success:hover { background:rgba(0,255,136,0.1); }

.toast { position:fixed; bottom:24px; right:24px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:16px 20px; transform:translateX(120%); transition:transform 0.3s; z-index:999; }
.toast.show { transform:translateX(0); }
.toast.ok { border-color:rgba(0,255,136,0.4); color:var(--green); }
.toast.err { border-color:rgba(255,51,85,0.4); color:var(--red); }
</style>
</head>
<body>
<div class="admin-header">
  <div class="admin-logo">⚙ ADMIN PANEL</div>
  <div class="admin-nav">
    <button class="nav-btn active" onclick="showSection('users',this)">USERS</button>
    <button class="nav-btn" onclick="showSection('matches',this)">MATCHES</button>
    <button class="nav-btn" onclick="showSection('transactions',this)">TRANSACTIONS</button>
  </div>
  <a href="/" class="back-btn">← LOBBY</a>
</div>

<div class="admin-main">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value" id="statUsers">—</div><div class="stat-label">Total Users</div></div>
    <div class="stat-card"><div class="stat-icon">🎮</div><div class="stat-value" id="statMatches">—</div><div class="stat-label">Matches Played</div></div>
    <div class="stat-card"><div class="stat-icon">🪙</div><div class="stat-value" id="statCoins">—</div><div class="stat-label">Coins in Circulation</div></div>
  </div>

  <!-- USERS -->
  <div class="section active" id="usersSection">
    <div class="grant-form">
      <div class="form-field"><label>Username</label><input id="grantUser" placeholder="username"></div>
      <div class="form-field"><label>Amount</label><input id="grantAmount" type="number" placeholder="1000" style="width:120px"></div>
      <button class="btn-admin" onclick="grantCoins()">GRANT COINS</button>
    </div>
    <div class="section-header">
      <div class="section-title">ALL USERS</div>
    </div>
    <table class="data-table">
      <thead><tr><th>ID</th><th>USERNAME</th><th>COINS</th><th>STATUS</th><th>JOINED</th><th>ACTIONS</th></tr></thead>
      <tbody id="usersBody"><tr><td colspan="6" style="text-align:center;color:var(--text-dim);padding:30px">Loading...</td></tr></tbody>
    </table>
  </div>

  <!-- MATCHES -->
  <div class="section" id="matchesSection">
    <div class="section-header"><div class="section-title">RECENT MATCHES</div></div>
    <table class="data-table">
      <thead><tr><th>ID</th><th>GAME</th><th>PLAYER 1</th><th>PLAYER 2</th><th>WINNER</th><th>RANKED</th><th>DATE</th></tr></thead>
      <tbody id="matchesBody"><tr><td colspan="7" style="text-align:center;color:var(--text-dim);padding:30px">Loading...</td></tr></tbody>
    </table>
  </div>

  <!-- TRANSACTIONS -->
  <div class="section" id="transactionsSection">
    <div class="section-header"><div class="section-title">COIN TRANSACTIONS</div></div>
    <table class="data-table">
      <thead><tr><th>ID</th><th>USER</th><th>AMOUNT</th><th>REASON</th><th>DATE</th></tr></thead>
      <tbody id="txnBody"><tr><td colspan="5" style="text-align:center;color:var(--text-dim);padding:30px">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
async function checkAdmin() {
  try {
    const r = await fetch('/api/auth/me');
    if (!r.ok) { window.location.href = '/'; return; }
    const d = await r.json();
    if (!d.isAdmin) { window.location.href = '/'; return; }
  } catch { window.location.href = '/'; }
}

function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name+'Section').classList.add('active');
  btn.classList.add('active');
  if (name==='users') loadUsers();
  else if (name==='matches') loadMatches();
  else if (name==='transactions') loadTransactions();
}

async function loadStats() {
  try {
    const r = await fetch('/api/admin/stats');
    const d = await r.json();
    document.getElementById('statUsers').textContent = d.userCount;
    document.getElementById('statMatches').textContent = d.matchCount;
    document.getElementById('statCoins').textContent = d.totalCoins?.toLocaleString();
  } catch {}
}

async function loadUsers() {
  try {
    const r = await fetch('/api/admin/users');
    const users = await r.json();
    const tb = document.getElementById('usersBody');
    tb.innerHTML = users.map(u => `
      <tr>
        <td>${u.id}</td>
        <td><strong>${u.username}</strong></td>
        <td style="color:var(--gold);font-family:'Orbitron',sans-serif">${u.coins?.toLocaleString()}</td>
        <td>
          ${u.is_admin ? '<span class="badge admin">ADMIN</span>' : ''}
          ${u.is_banned ? '<span class="badge banned">BANNED</span>' : (!u.is_admin ? '<span class="badge normal">ACTIVE</span>' : '')}
        </td>
        <td style="color:var(--text-dim)">${new Date(u.created_at).toLocaleDateString()}</td>
        <td>
          ${!u.is_admin ? `
            ${u.is_banned
              ? `<button class="btn-success" onclick="banUser('${u.username}',false)">UNBAN</button>`
              : `<button class="btn-danger" onclick="banUser('${u.username}',true)">BAN</button>`
            }
          ` : '—'}
        </td>
      </tr>
    `).join('');
  } catch {}
}

async function loadMatches() {
  try {
    const r = await fetch('/api/admin/matches');
    const matches = await r.json();
    const tb = document.getElementById('matchesBody');
    tb.innerHTML = matches.map(m => `
      <tr>
        <td>${m.id}</td>
        <td style="text-transform:uppercase">${m.game}</td>
        <td>${m.player1}</td>
        <td>${m.player2 || '—'}</td>
        <td style="color:var(--gold)">${m.winner || '—'}</td>
        <td>${m.is_ranked ? '<span class="badge admin">YES</span>' : 'No'}</td>
        <td style="color:var(--text-dim)">${new Date(m.created_at).toLocaleDateString()}</td>
      </tr>
    `).join('');
  } catch {}
}

async function loadTransactions() {
  try {
    const r = await fetch('/api/admin/transactions');
    const txns = await r.json();
    const tb = document.getElementById('txnBody');
    tb.innerHTML = txns.map(t => `
      <tr>
        <td>${t.id}</td>
        <td>${t.username}</td>
        <td style="color:${t.amount>0?'var(--green)':'var(--red)'};font-family:'Orbitron',sans-serif">
          ${t.amount>0?'+':''}${t.amount?.toLocaleString()}
        </td>
        <td style="color:var(--text-dim)">${t.reason}</td>
        <td style="color:var(--text-dim)">${new Date(t.created_at).toLocaleString()}</td>
      </tr>
    `).join('');
  } catch {}
}

async function grantCoins() {
  const username = document.getElementById('grantUser').value.trim();
  const amount = parseInt(document.getElementById('grantAmount').value);
  if (!username || !amount) { showToast('Fill in both fields', 'err'); return; }
  try {
    const r = await fetch('/api/coins/admin/grant', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username, amount })
    });
    const d = await r.json();
    if (!r.ok) { showToast(d.error, 'err'); return; }
    showToast(`Granted ${amount} coins to ${username}`, 'ok');
    loadUsers(); loadStats();
  } catch { showToast('Failed', 'err'); }
}

async function banUser(username, ban) {
  try {
    const r = await fetch('/api/admin/ban', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username, banned: ban })
    });
    if (r.ok) { showToast(ban ? `${username} banned` : `${username} unbanned`, 'ok'); loadUsers(); }
  } catch { showToast('Failed', 'err'); }
}

let toastTimer;
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

checkAdmin().then(() => { loadStats(); loadUsers(); });
</script>
</body>
</html>
